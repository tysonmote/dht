name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install Consul
        run: |
          curl -fsSL https://releases.hashicorp.com/consul/1.20.2/consul_1.20.2_linux_amd64.zip -o consul.zip
          unzip -o consul.zip consul
          sudo mv consul /usr/local/bin/

      - name: Test
        run: go test -race -count=1 ./...
